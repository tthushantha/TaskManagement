<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if task %}Edit Task{% else %}Create Task{% endif %} - Task Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 1rem;
        }
        .sidebar .nav-link:hover {
            color: white;
            background-color: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link.active {
            color: white;
            background-color: #007bff;
        }
        .main-content {
            padding: 2rem;
        }
        .form-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="d-flex flex-column p-3">
                    <h4 class="mb-4">Task Manager</h4>
                    <ul class="nav nav-pills flex-column mb-auto">
                        <li class="nav-item">
                            <a href="/dashboard" class="nav-link">
                                <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/tasks" class="nav-link active">
                                <i class="fas fa-tasks me-2"></i> Tasks
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/projects" class="nav-link">
                                <i class="fas fa-project-diagram me-2"></i> Projects
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/profile" class="nav-link">
                                <i class="fas fa-user me-2"></i> Profile
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="/logout" class="nav-link">
                                <i class="fas fa-sign-out-alt me-2"></i> Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1>{% if task %}Edit Task{% else %}Create Task{% endif %}</h1>
                    <a href="/tasks" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i> Back to Tasks
                    </a>
                </div>
                
                <div class="form-card">
                    <form method="post" action="{% if task %}/tasks/{{ task.id }}/edit{% else %}/tasks/create{% endif %}">
                        <div class="row">
                            <div class="col-md-8">
                                <div class="mb-3">
                                    <label for="title" class="form-label">Task Title *</label>
                                    <input type="text" class="form-control" id="title" name="title" 
                                           value="{{ task.title if task else '' }}" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="priority" class="form-label">Priority *</label>
                                    <select class="form-select" id="priority" name="priority" required>
                                        <option value="">Select Priority</option>
                                        <option value="low" {% if task and task.priority == 'low' %}selected{% endif %}>Low</option>
                                        <option value="medium" {% if task and task.priority == 'medium' %}selected{% endif %}>Medium</option>
                                        <option value="high" {% if task and task.priority == 'high' %}selected{% endif %}>High</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4">{{ task.description if task else '' }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="project_id" class="form-label">Project *</label>
                                    <select class="form-select" id="project_id" name="project_id" required>
                                        <option value="">Select Project</option>
                                        {% for project in projects %}
                                        <option value="{{ project.id }}" {% if task and task.project_id == project.id %}selected{% endif %}>{{ project.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="assignee_id" class="form-label">Assignee</label>
                                    <select class="form-select" id="assignee_id" name="assignee_id">
                                        <option value="">Unassigned</option>
                                        {% for user in users %}
                                        <option value="{{ user.id }}" {% if task and task.assignee_id == user.id %}selected{% endif %}>{{ user.full_name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="due_date" class="form-label">Due Date</label>
                                    <input type="date" class="form-control" id="due_date" name="due_date" 
                                           value="{{ task.due_date if task else '' }}">
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="pending" {% if not task or task.status == 'pending' %}selected{% endif %}>Pending</option>
                                <option value="in_progress" {% if task and task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                                <option value="completed" {% if task and task.status == 'completed' %}selected{% endif %}>Completed</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="tags" class="form-label">Tags</label>
                            <input type="text" class="form-control" id="tags" name="tags" 
                                   value="{{ task.tags if task else '' }}" 
                                   placeholder="Enter tags separated by commas">
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i> {% if task %}Update Task{% else %}Create Task{% endif %}
                                </button>
                                <a href="/tasks" class="btn btn-outline-secondary ms-2">Cancel</a>
                            </div>
                            {% if task %}
                            <a href="/tasks/{{ task.id }}/delete" class="btn btn-outline-danger" 
                               onclick="return confirm('Are you sure you want to delete this task?')">
                                <i class="fas fa-trash me-2"></i> Delete Task
                            </a>
                            {% endif %}
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
